<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Complexity Notes</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #0b3a73 0%, #061f43 38%, #020b1d 100%);
        color: #eef6ff;
        line-height: 1.6;
      }

      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 48px 20px;
      }

      a {
        color: #86d7ff;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        margin-top: 18px;
      }

      .card {
        background: rgba(8, 35, 72, 0.88);
        border: 1px solid rgba(125, 211, 252, 0.22);
        border-radius: 8px;
        padding: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <a href="./">Back to visualizer</a>
      <h1>Complexity Notes</h1>
      <div class="grid">
        <div class="card">
          <h2>O(1)</h2>
          <p>Constant time. The work does not grow with input size.</p>
        </div>
        <div class="card">
          <h2>O(log n)</h2>
          <p>Logarithmic time. Binary search belongs here because each step halves the data.</p>
        </div>
        <div class="card">
          <h2>O(n)</h2>
          <p>Linear time. Linear search may check every element once.</p>
        </div>
      </div>
    </main>
  </body>
</html>
